<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <!-- Wand gradient -->
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for rounded square -->
    <clipPath id="roundedClip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
    <!-- Checkerboard pattern -->
    <pattern id="checker" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#ffffff20"/>
      <rect x="4" y="4" width="4" height="4" fill="#ffffff20"/>
    </pattern>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Image frame outline -->
  <rect x="10" y="14" width="38" height="30" rx="3" ry="3" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.6"/>

  <!-- Checkerboard in bottom-left of frame (transparent bg indicator) -->
  <clipPath id="checkerClip">
    <rect x="10" y="30" width="19" height="14" rx="0" ry="0"/>
  </clipPath>
  <rect x="10" y="30" width="19" height="14" fill="url(#checker)" clip-path="url(#checkerClip)"/>

  <!-- Solid image area (top-right of frame, representing kept subject) -->
  <rect x="29" y="14" width="19" height="16" fill="#4f46e5" opacity="0.3"/>
  <!-- Simple person silhouette -->
  <ellipse cx="38" cy="20" rx="4" ry="4" fill="#a78bfa" opacity="0.8"/>
  <path d="M31 30 Q38 24 45 30" fill="#7c3aed" opacity="0.7"/>

  <!-- Frame border on top of checkerboard -->
  <rect x="10" y="14" width="38" height="30" rx="3" ry="3" fill="none" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Magic wand -->
  <g filter="url(#glow)">
    <!-- Wand stick -->
    <line x1="36" y1="50" x2="53" y2="33" stroke="url(#wandGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Wand tip star -->
    <polygon points="34,52 35.2,49.2 32,48.5 35.2,47.8 34,45 36.3,47 38.5,44.5 37.8,47.8 41,48.5 37.8,49.2" fill="#c4b5fd" filter="url(#glow)"/>
  </g>

  <!-- Sparkles -->
  <!-- Large star near wand tip -->
  <g transform="translate(52,33)" filter="url(#glow)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#f0abfc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#f0abfc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#f0abfc" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#f0abfc" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- Small star 1 -->
  <g transform="translate(46,28)" filter="url(#glow)">
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#e9d5ff" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#e9d5ff" stroke-width="0.9" stroke-linecap="round"/>
  </g>
  <!-- Tiny dot sparkle -->
  <circle cx="57" cy="40" r="1.2" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="43" cy="23" r="0.9" fill="#e879f9" opacity="0.8"/>
</svg>